name: tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, pytest]
    # Только при пуше в main (т.е. после мержа PR develop→main) и только если
    # lint + pytest зелёные. На develop и в PR — job пропускается.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/bottennis
            git pull --ff-only
            systemctl restart bottennis

  release:
    runs-on: ubuntu-latest
    needs: [lint, pytest]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version and notes from RELEASE_NOTES.md
        id: extract
        run: |
          python3 - <<'EOF'
          import re, os, sys

          text = open("RELEASE_NOTES.md").read()
          m = re.search(r'^## (v[\d.]+)', text, re.MULTILINE)
          if not m:
              print("No version heading found in RELEASE_NOTES.md", file=sys.stderr)
              sys.exit(1)
          version = m.group(1)
          start = m.end()
          end = text.find('\n---', start)
          notes = text[start:end].strip() if end != -1 else text[start:].strip()

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"version={version}\n")
          with open('release_body.md', 'w') as f:
              f.write(notes)
          print(f"Extracted: {version}, notes length: {len(notes)}")
          EOF

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping."
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --notes-file release_body.md \
              --latest
          fi
